# Stack de production cal.nvt.one — auto-suffisante (n'utilise PAS le docker-compose.yml du repo).
#   docker compose -f docker-compose.prod.yml up -d
#
# Façade : Caddy écoute le 443 interne, mappé sur l'hôte ${HOST_PORT:-10226}.
# Evolix transmet cal.nvt.one (HTTPS pass-through) -> docker02:10310 -> Caddy (TLS terminé ici).
# web / api / db / redis ne sont PAS exposés sur l'hôte (réseau interne uniquement).

volumes:
  database-data:
  redis-data:
  caddy-data:
  caddy-config:

networks:
  stack:
    name: stack

services:
  database:
    container_name: cal-database
    image: postgres:16
    restart: always
    volumes:
      - database-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks: [stack]

  redis:
    container_name: cal-redis
    image: redis:latest
    restart: always
    volumes:
      - redis-data:/data
    networks: [stack]

  calcom:
    container_name: cal-web
    image: cal-nvt-web:latest
    build:
      context: .
      dockerfile: Dockerfile
      # Cache inline BuildKit : l'image porte ses métadonnées de cache, réutilisées au build suivant.
      cache_from:
        - cal-nvt-web:latest
      args:
        BUILDKIT_INLINE_CACHE: "1"
        NEXT_PUBLIC_WEBAPP_URL: ${NEXT_PUBLIC_WEBAPP_URL}
        NEXT_PUBLIC_API_V2_URL: ${NEXT_PUBLIC_API_V2_URL}
        CALCOM_TELEMETRY_DISABLED: ${CALCOM_TELEMETRY_DISABLED}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
        CALENDSO_ENCRYPTION_KEY: ${CALENDSO_ENCRYPTION_KEY}
        DATABASE_URL: ${DATABASE_URL}
        DATABASE_DIRECT_URL: ${DATABASE_URL}
    restart: always
    networks: [stack]
    env_file: .env
    environment:
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DATABASE_HOST}/${POSTGRES_DB}
      - DATABASE_DIRECT_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DATABASE_HOST}/${POSTGRES_DB}
    depends_on: [database]

  calcom-api:
    container_name: cal-api
    image: cal-nvt-api:latest
    build:
      context: .
      dockerfile: apps/api/v2/Dockerfile
      cache_from:
        - cal-nvt-api:latest
      args:
        BUILDKIT_INLINE_CACHE: "1"
        DATABASE_URL: ${DATABASE_URL}
        DATABASE_DIRECT_URL: ${DATABASE_URL}
    restart: always
    networks: [stack]
    env_file: .env
    environment:
      - NODE_ENV=production
      - API_PORT=${API_PORT:-3002}
      - API_URL=${API_URL}
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DATABASE_HOST}/${POSTGRES_DB}
      - DATABASE_READ_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DATABASE_HOST}/${POSTGRES_DB}
      - DATABASE_WRITE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DATABASE_HOST}/${POSTGRES_DB}
      - DATABASE_DIRECT_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DATABASE_HOST}/${POSTGRES_DB}
      - REDIS_URL=${REDIS_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - REWRITE_API_V2_PREFIX=${REWRITE_API_V2_PREFIX:-1}
      - API_KEY_PREFIX=${API_KEY_PREFIX:-cal_}
      - WEB_APP_URL=${WEB_APP_URL}
      - IS_E2E=${IS_E2E:-false}
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    depends_on: [database, redis]

  caddy:
    container_name: cal-caddy
    image: caddy:2-alpine
    restart: always
    networks: [stack]
    # Caddy termine le TLS sur son 443 interne, exposé sur l'hôte via HOST_PORT (Evolix -> docker02:10310).
    ports:
      - "${HOST_PORT:-10226}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on: [calcom, calcom-api]
